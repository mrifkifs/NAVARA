<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAVARA - Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg-main: #0c0c0d; --bg-card: #151517; --accent-gold: #c7a542; --accent-red: #da4444; --text-white: #ffffff; --text-gray: #8e8e93; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-white); padding: 40px 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px; }
        h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; }
        h1 span { color: var(--accent-gold); }
        .back-btn { color: var(--text-gray); text-decoration: none; font-size: 0.95rem; transition: 0.3s; }
        .back-btn:hover { color: var(--accent-gold); }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        @media (max-width: 900px) { .admin-grid { grid-template-columns: 1fr; } }
        .admin-card { background-color: var(--bg-card); padding: 30px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.03); margin-bottom: 30px; }
        h2 { font-size: 1.3rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; border-left: 3px solid var(--accent-gold); padding-left: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; color: var(--text-gray); margin-bottom: 6px; font-weight: 500; }
        input[type="text"], select { width: 100%; padding: 12px; background-color: #0c0c0d; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; color: white; font-size: 0.95rem; transition: 0.3s; }
        input[type="text"]:focus, select:focus { border-color: var(--accent-gold); outline: none; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin: 15px 0; }
        input[type="checkbox"] { accent-color: var(--accent-gold); width: 16px; height: 16px; }
        button { width: 100%; padding: 12px; background-color: transparent; border: 1px solid var(--accent-gold); color: var(--accent-gold); border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 0.95rem; }
        button:hover { background-color: var(--accent-gold); color: var(--bg-main); }
        .data-table-container { max-height: 500px; overflow-y: auto; margin-top: 15px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
        th, td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { background-color: #0c0c0d; color: var(--text-gray); font-weight: 600; position: sticky; top: 0; }
        td { color: rgba(255,255,255,0.9); }
        .btn-delete { background: transparent; border: none; color: var(--text-gray); cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn-delete:hover { color: var(--accent-red); }
        .highlight-tag { background-color: rgba(199, 165, 66, 0.15); color: var(--accent-gold); padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; margin-top: 5px; display: inline-block;}
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>NAVARA <span>Admin Panel</span></h1>
            <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Lihat Web Utama</a>
        </header>

        <div class="admin-grid">
            <div>
                <div class="admin-card">
                    <h2><i class="fa-solid fa-user-plus"></i> Kelola Anggota</h2>
                    <form id="form-anggota">
                        <div class="form-group"><label>Nama Lengkap *</label><input type="text" id="ang-nama" placeholder="CONTOH: GINA AGUSTINA" required></div>
                        <div class="form-group"><label>NIM *</label><input type="text" id="ang-nim" placeholder="CONTOH: 300225008" required></div>
                        
                        <div class="form-group"><label>Username Instagram (Opsional)</label><input type="text" id="ang-ig" placeholder="Contoh: gina_agstn (Tanpa tanda @)"></div>
                        <div class="form-group"><label>Nomor WhatsApp (Opsional)</label><input type="text" id="ang-wa" placeholder="Contoh: 08123456789"></div>
                        <div class="form-group"><label>Link Profil LinkedIn (Opsional)</label><input type="text" id="ang-linkedin" placeholder="Contoh: https://linkedin.com/in/username"></div>
                        
                        <div class="form-group">
                            <label>Foto Profil (Upload File)</label>
                            <input type="file" id="ang-foto-upload" accept="image/*" style="width: 100%; padding: 10px; background: #0c0c0d; border: 1px solid #333; color: white; border-radius: 8px;">
                        </div>                        
                        <div class="checkbox-group">
                            <input type="checkbox" id="ang-highlight">
                            <label for="ang-highlight" style="margin:0; cursor:pointer;">Aktifkan Border Emas (Highlight Spesifik)</label>
                        </div>
                        
                        <button type="submit">Simpan Anggota</button>
                    </form>
                </div>
                <div class="admin-card">
                    <h2><i class="fa-solid fa-users"></i> Daftar Anggota Kelas</h2>
                    <div class="data-table-container">
                        <table>
                            <thead><tr><th>Nama</th><th>NIM</th><th style="text-align:center;">Aksi</th></tr></thead>
                            <tbody id="list-anggota"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div>
                <div class="admin-card">
                    <h2><i class="fa-solid fa-calendar-plus"></i> Tambah Jadwal Kuliah</h2>
                    <form id="form-jadwal">
                        <div class="form-group">
                            <label>Hari</label>
                            <select id="jad-hari" required>
                                <option value="Senin">Senin</option><option value="Selasa">Selasa</option><option value="Rabu">Rabu</option><option value="Kamis">Kamis</option><option value="Jumat">Jumat</option>
                            </select>
                        </div>
                        <div class="form-group"><label>Waktu / Jam</label><input type="text" id="jad-waktu" placeholder="CONTOH: 08:00 - 10:30" required></div>
                        <div class="form-group"><label>Nama Mata Kuliah</label><input type="text" id="jad-nama" placeholder="CONTOH: Statistika Bisnis" required></div>
                        <div class="form-group"><label>Ruangan</label><input type="text" id="jad-ruang" placeholder="CONTOH: Ruang 3B Kampus 2" required></div>
                        <button type="submit">Simpan Jadwal</button>
                    </form>
                </div>
                <div class="admin-card">
                    <h2><i class="fa-solid fa-calendar-days"></i> Daftar Jadwal</h2>
                    <div class="data-table-container">
                        <table>
                            <thead><tr><th>Hari</th><th>Mata Kuliah</th><th>Waktu</th><th style="text-align:center;">Aksi</th></tr></thead>
                            <tbody id="list-jadwal"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // 1. IMPORT DARI FIREBASE (Hanya Firestore yang dibutuhkan)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 2. INISIALISASI FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyABpQq2OuXJeXbu2uxLaecRGL8srH01foQ",
            authDomain: "navara-8ac77.firebaseapp.com",
            projectId: "navara-8ac77",
            storageBucket: "navara-8ac77.firebasestorage.app",
            messagingSenderId: "35453814512",
            appId: "1:35453814512:web:cb94f20d324fa0f9e36435"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- FUNGSI RAHASIA MENGUBAH FOTO JADI TEKS ---
        function konversiKeBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        // --- SISTEM CRUD ANGGOTA ---
        const formAnggota = document.getElementById('form-anggota');
        const btnSubmitAnggota = formAnggota.querySelector('button');
        let currentFotoUrl = ""; // Penampung link foto lama saat proses edit

        formAnggota.addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = btnSubmitAnggota.getAttribute('data-editing-id');
            const fotoFile = document.getElementById('ang-foto-upload').files[0];
            let finalFotoUrl = currentFotoUrl;

            // Kunci tombol agar tidak diklik dua kali
            btnSubmitAnggota.innerText = "Memproses Data...";
            btnSubmitAnggota.disabled = true;

            try {
                // Jika user mengupload foto, langsung ubah jadi Base64
                if (fotoFile) {
                    finalFotoUrl = await konversiKeBase64(fotoFile);
                } else if (!editId && !fotoFile) {
                    // Jika tidak ada foto baru dan bukan edit, beri foto kosong bawaan
                    finalFotoUrl = "https://via.placeholder.com/150"; 
                }

                // Siapkan data untuk dilempar ke database
                const payloadAnggota = {
                    nama: document.getElementById('ang-nama').value.toUpperCase(),
                    nim: document.getElementById('ang-nim').value,
                    instagram: document.getElementById('ang-ig').value,
                    whatsapp: document.getElementById('ang-wa').value,
                    linkedin: document.getElementById('ang-linkedin').value,
                    fotoUrl: finalFotoUrl,
                    isHighlighted: document.getElementById('ang-highlight').checked,
                    updatedAt: Date.now()
                };

                if (editId) {
                    // Eksekusi Update
                    await updateDoc(doc(db, "anggota", editId), payloadAnggota);
                    alert("Data Anggota berhasil diperbarui!");
                    btnSubmitAnggota.removeAttribute('data-editing-id');
                } else {
                    // Eksekusi Tambah Baru
                    payloadAnggota.createdAt = Date.now();
                    await addDoc(collection(db, "anggota"), payloadAnggota);
                    alert("Data Anggota berhasil ditambahkan!");
                }

                // Kembalikan form ke keadaan semula
                formAnggota.reset();
                currentFotoUrl = "";
                btnSubmitAnggota.innerText = "Simpan Anggota";
                btnSubmitAnggota.disabled = false;
                loadAnggota();

            } catch (error) {
                console.error("Gagal memproses form anggota: ", error);
                alert("Gagal memproses data!\n\nDetail Error: " + error.message);
                btnSubmitAnggota.innerText = editId ? "Update Anggota" : "Simpan Anggota";
                btnSubmitAnggota.disabled = false;
            }
        });

        async function loadAnggota() {
            const tbody = document.getElementById('list-anggota');
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">Memuat data...</td></tr>';
            
            try {
                const q = query(collection(db, "anggota"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                tbody.innerHTML = '';

                querySnapshot.forEach((res) => {
                    const data = res.data();
                    const row = document.createElement('tr');
                    const badgeHighlight = data.isHighlighted ? '<br><span class="highlight-tag">Highlight</span>' : '';
                    
                    row.innerHTML = `
                        <td><strong>${data.nama}</strong> ${badgeHighlight}</td>
                        <td>${data.nim}</td>
                        <td style="text-align:center;">
                            <button class="btn-edit" data-id="${res.id}" style="margin-right:10px; color:var(--accent-gold); border:none; background:none; cursor:pointer;"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button class="btn-delete" data-collection="anggota" data-id="${res.id}" style="color:var(--text-gray); border:none; background:none; cursor:pointer;"><i class="fa-solid fa-trash-can"></i></button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                // Handler tombol Edit
                document.querySelectorAll('#list-anggota .btn-edit').forEach(btn => {
                    btn.onclick = async () => {
                        const id = btn.getAttribute('data-id');
                        const docRef = doc(db, "anggota", id);
                        const docSnap = await getDoc(docRef);
                        
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            document.getElementById('ang-nama').value = data.nama;
                            document.getElementById('ang-nim').value = data.nim;
                            document.getElementById('ang-ig').value = data.instagram || '';
                            document.getElementById('ang-wa').value = data.whatsapp || '';
                            document.getElementById('ang-linkedin').value = data.linkedin || '';
                            document.getElementById('ang-highlight').checked = data.isHighlighted || false;
                            
                            currentFotoUrl = data.fotoUrl || "";
                            btnSubmitAnggota.innerText = "Update Anggota";
                            btnSubmitAnggota.setAttribute('data-editing-id', id);
                            window.scrollTo({ top: 0, behavior: 'smooth' });
                        }
                    };
                });
                attachDeleteEvents();
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:var(--accent-red);">Gagal memuat data.</td></tr>';
            }
        }

        // --- SISTEM CRUD JADWAL ---
        const formJadwal = document.getElementById('form-jadwal');
        const btnSubmitJadwal = formJadwal.querySelector('button');

        formJadwal.addEventListener('submit', async (e) => {
            e.preventDefault();
            btnSubmitJadwal.innerText = "Menyimpan...";
            btnSubmitJadwal.disabled = true;

            try {
                await addDoc(collection(db, "jadwal"), {
                    hari: document.getElementById('jad-hari').value,
                    waktu: document.getElementById('jad-waktu').value,
                    nama: document.getElementById('jad-nama').value,
                    ruang: document.getElementById('jad-ruang').value,
                    createdAt: Date.now()
                });
                alert("Jadwal Kuliah berhasil ditambahkan!");
                formJadwal.reset();
                btnSubmitJadwal.innerText = "Simpan Jadwal";
                btnSubmitJadwal.disabled = false;
                loadJadwal();
            } catch (error) { 
                alert("Gagal menyimpan jadwal: " + error.message); 
                btnSubmitJadwal.innerText = "Simpan Jadwal";
                btnSubmitJadwal.disabled = false;
            }
        });

        async function loadJadwal() {
            const tbody = document.getElementById('list-jadwal');
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Memuat data...</td></tr>';
            
            try {
                const q = query(collection(db, "jadwal"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                tbody.innerHTML = '';

                querySnapshot.forEach((res) => {
                    const data = res.data();
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong>${data.hari}</strong></td>
                        <td>${data.nama} <br><small style="color:var(--text-gray)">${data.ruang}</small></td>
                        <td>${data.waktu}</td>
                        <td style="text-align:center;">
                            <button class="btn-delete" data-collection="jadwal" data-id="${res.id}" style="color:var(--text-gray); border:none; background:none; cursor:pointer;"><i class="fa-solid fa-trash-can"></i></button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
                attachDeleteEvents();
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:var(--accent-red);">Gagal memuat data jadwal.</td></tr>';
            }
        }

        // --- SISTEM HAPUS DATA GLOBAL ---
        function attachDeleteEvents() {
            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.onclick = async (e) => {
                    e.stopImmediatePropagation();
                    if(confirm("Apakah Anda yakin ingin menghapus data ini secara permanen?")) {
                        const id = btn.getAttribute('data-id');
                        const collectionName = btn.getAttribute('data-collection');
                        
                        try {
                            await deleteDoc(doc(db, collectionName, id));
                            if(collectionName === 'anggota') loadAnggota();
                            if(collectionName === 'jadwal') loadJadwal();
                        } catch (err) {
                            alert("Gagal menghapus data: " + err.message);
                        }
                    }
                };
            });
        }

        // Load data saat halaman pertama kali dibuka
        loadAnggota();
        loadJadwal();
    </script>
</body>
</html>
