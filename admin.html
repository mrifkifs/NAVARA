<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAVARA - Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg-main: #0c0c0d; 
            --bg-card: #151517; 
            --accent-gold: #c7a542; 
            --accent-red: #da4444; 
            --text-white: #ffffff; 
            --text-gray: #8e8e93; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-white); padding: 40px 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        header { margin-bottom: 40px; border-bottom: 1px solid #222; padding-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 24px; font-weight: 800; letter-spacing: 1px; }
        header h1 span { color: var(--accent-gold); }
        .back-btn { color: var(--text-gray); text-decoration: none; font-size: 14px; transition: 0.3s; }
        .back-btn:hover { color: var(--accent-gold); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 40px; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
        
        .card { background-color: var(--bg-card); padding: 25px; border-radius: 8px; border: 1px solid #222; }
        .card h2 { font-size: 18px; margin-bottom: 20px; color: var(--accent-gold); display: flex; align-items: center; gap: 10px; }
        
        form { display: flex; flex-direction: column; gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        label { font-size: 11px; color: var(--text-gray); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
        input, select { background-color: #0c0c0d; border: 1px solid #333; padding: 12px; border-radius: 6px; color: #fff; font-size: 14px; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--accent-gold); }
        
        button { background-color: var(--accent-gold); color: #0c0c0d; border: none; padding: 12px; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 14px; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background-color: var(--text-gray); cursor: not-allowed; opacity: 0.6; }

        .table-container { margin-top: 25px; overflow-x: auto; background-color: #0c0c0d; border-radius: 6px; border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { padding: 14px; border-bottom: 2px solid #222; color: var(--text-gray); font-weight: 600; font-size: 12px; text-transform: uppercase; }
        td { padding: 14px; border-bottom: 1px solid #1a1a1c; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #111113; }
        
        .img-preview { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; background: #222; border: 1px solid #333; }
        .btn-edit { color: var(--accent-gold); border: none; background: none; cursor: pointer; font-size: 16px; margin-right: 15px; transition: 0.2s; }
        .btn-delete { color: var(--text-gray); border: none; background: none; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-edit:hover { transform: scale(1.1); }
        .btn-delete:hover { color: var(--accent-red); transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>NAVARA <span>SOCIETY CONTROL</span></h1>
            <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Lihat Web Utama</a>
        </header>

        <div class="grid">
            <div class="card">
                <h2><i class="fa-solid fa-user-gear"></i> Kelola Anggota Kelas</h2>
                <form id="form-anggota">
                    <div class="form-group">
                        <label for="ang-nama">Nama Lengkap</label>
                        <input type="text" id="ang-nama" required placeholder="Contoh: ALEXANDER WILIAM">
                    </div>
                    <div class="form-group">
                        <label for="ang-nim">NIM</label>
                        <input type="text" id="ang-nim" required placeholder="Contoh: 2401010021">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="ang-ig">Username Instagram</label>
                            <input type="text" id="ang-ig" placeholder="Tanpa @ (Contoh: alex_wlm)">
                        </div>
                        <div class="form-group">
                            <label for="ang-wa">No. WhatsApp</label>
                            <input type="text" id="ang-wa" placeholder="Contoh: 62812345678">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="ang-linkedin">URL LinkedIn</label>
                        <input type="url" id="ang-linkedin" placeholder="Contoh: https://linkedin.com/in/alex">
                    </div>
                    <div class="form-group">
                        <label for="ang-foto">Foto Profil (Opsional)</label>
                        <input type="file" id="ang-foto" accept="image/*">
                    </div>
                    <button type="submit">Simpan Anggota</button>
                </form>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 60px;">Foto</th>
                                <th>Nama</th>
                                <th>NIM</th>
                                <th style="text-align:center; width: 100px;">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="list-anggota">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <h2><i class="fa-solid fa-calendar-days"></i> Tambah Jadwal Kuliah</h2>
                <form id="form-jadwal">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="jad-hari">Hari</label>
                            <select id="jad-hari" required>
                                <option value="Senin">Senin</option>
                                <option value="Selasa">Selasa</option>
                                <option value="Rabu">Rabu</option>
                                <option value="Kamis">Kamis</option>
                                <option value="Jumat">Jumat</option>
                                <option value="Sabtu">Sabtu</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="jad-waktu">Waktu/Jam</label>
                            <input type="text" id="jad-waktu" required placeholder="Contoh: 08:00 - 09:40">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="jad-nama">Nama Mata Kuliah</label>
                        <input type="text" id="jad-nama" required placeholder="Contoh: Pemrograman Web Dasar">
                    </div>
                    <div class="form-group">
                        <label for="jad-ruang">Ruangan Kuliah</label>
                        <input type="text" id="jad-ruang" required placeholder="Contoh: Ruang Lab Komputer 3 atau ONLINE">
                    </div>
                    <button type="submit">Simpan Jadwal</button>
                </form>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Hari</th>
                                <th>Mata Kuliah & Ruang</th>
                                <th>Waktu</th>
                                <th style="text-align:center; width: 70px;">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="list-jadwal">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyABpQq2OuXJeXbu2uxLaecRGL8srH01foQ",
            authDomain: "navara-8ac77.firebaseapp.com",
            projectId: "navara-8ac77",
            storageBucket: "navara-8ac77.firebasestorage.app",
            messagingSenderId: "35453814512",
            appId: "1:35453814512:web:cb94f20d324fa0f9e36435"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // State global untuk menampung link foto lama saat proses Edit Anggota dilakukan
        let currentFotoUrl = "";

        const formAnggota = document.getElementById('form-anggota');
        const btnSubmitAnggota = formAnggota.querySelector('button');

        // PROSES SUBMIT / SIMPAN DATA ANGGOTA (DENGAN UPLOAD FOTO KE STORAGE)
        formAnggota.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const editId = btnSubmitAnggota.getAttribute('data-editing-id');
            const fotoFile = document.getElementById('ang-foto').files[0];
            let fotoUrl = currentFotoUrl; // Default menggunakan link foto lama (jika ada) atau kosong

            btnSubmitAnggota.innerText = "Memproses Data...";
            btnSubmitAnggota.disabled = true;

            try {
                // Jalankan upload file jika user memilih file foto baru
                if (fotoFile) {
                    const storageRef = ref(storage, 'anggota/' + Date.now() + '_' + fotoFile.name);
                    const snapshot = await uploadBytes(storageRef, fotoFile);
                    fotoUrl = await getDownloadURL(snapshot.ref);
                }

                const payloadAnggota = {
                    nama: document.getElementById('ang-nama').value.toUpperCase(),
                    nim: document.getElementById('ang-nim').value,
                    instagram: document.getElementById('ang-ig').value,
                    whatsapp: document.getElementById('ang-wa').value,
                    linkedin: document.getElementById('ang-linkedin').value,
                    foto: fotoUrl,
                    updatedAt: Date.now()
                };

                if (editId) {
                    // Eksekusi Update ke Dokumen Firebase yang Sudah Ada
                    await updateDoc(doc(db, "anggota", editId), payloadAnggota);
                    alert("Data Anggota berhasil diperbarui!");
                    btnSubmitAnggota.removeAttribute('data-editing-id');
                    btnSubmitAnggota.innerText = "Simpan Anggota";
                } else {
                    // Eksekusi Pembuatan Dokumen Anggota Baru
                    payloadAnggota.createdAt = Date.now();
                    await addDoc(collection(db, "anggota"), payloadAnggota);
                    alert("Data Anggota berhasil ditambahkan!");
                }

                formAnggota.reset();
                currentFotoUrl = "";
                btnSubmitAnggota.disabled = false;
                btnSubmitAnggota.innerText = "Simpan Anggota";
                loadAnggota();

            } catch (error) {
                console.error("Gagal memproses form anggota: ", error);
                alert("Terjadi kesalahan sistem: " + error.message);
                btnSubmitAnggota.disabled = false;
                btnSubmitAnggota.innerText = editId ? "Update Anggota" : "Simpan Anggota";
            }
        });

        // AMBIL & CETAK DATA DAFTAR ANGGOTA KELAS
        async function loadAnggota() {
            const tbody = document.getElementById('list-anggota');
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:var(--text-gray);">Memuat data...</td></tr>';
            
            try {
                const q = query(collection(db, "anggota"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                tbody.innerHTML = '';

                if (querySnapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:var(--text-gray);">Belum ada data anggota.</td></tr>';
                    return;
                }

                querySnapshot.forEach((res) => {
                    const data = res.data();
                    const row = document.createElement('tr');
                    
                    // Gunakan gambar placeholder jika field foto kosong di Firestore
                    const srcFoto = data.foto || "https://via.placeholder.com/150";

                    row.innerHTML = `
                        <td><img src="${srcFoto}" class="img-preview" alt="Foto"></td>
                        <td><strong>${data.nama}</strong></td>
                        <td>${data.nim}</td>
                        <td style="text-align:center;">
                            <button class="btn-edit" data-id="${res.id}"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button class="btn-delete" data-collection="anggota" data-id="${res.id}"><i class="fa-solid fa-trash-can"></i></button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                // Handler Event Click Tombol Edit Data Anggota
                document.querySelectorAll('#list-anggota .btn-edit').forEach(btn => {
                    btn.onclick = async () => {
                        const id = btn.getAttribute('data-id');
                        const snap = await getDocs(query(collection(db, "anggota")));
                        const match = snap.docs.find(d => d.id === id);
                        
                        if (match) {
                            const data = match.data();
                            document.getElementById('ang-nama').value = data.nama;
                            document.getElementById('ang-nim').value = data.nim;
                            document.getElementById('ang-ig').value = data.instagram || '';
                            document.getElementById('ang-wa').value = data.whatsapp || '';
                            document.getElementById('ang-linkedin').value = data.linkedin || '';
                            
                            currentFotoUrl = data.foto || ""; // Menyimpan url foto lama jika file input tidak diubah
                            btnSubmitAnggota.innerText = "Update Anggota";
                            btnSubmitAnggota.setAttribute('data-editing-id', id);
                            
                            // Scroll halus ke arah form atas agar admin sadar sedang dalam mode edit
                            window.scrollTo({ top: 0, behavior: 'smooth' });
                        }
                    };
                });

                attachDeleteEvents();

            } catch (error) {
                console.error("Gagal memuat anggota: ", error);
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:var(--accent-red);">Gagal memuat data dari database.</td></tr>';
            }
        }

        // PROSES SUBMIT / SIMPAN DATA JADWAL
        const formJadwal = document.getElementById('form-jadwal');
        const btnSubmitJadwal = formJadwal.querySelector('button');

        formJadwal.addEventListener('submit', async (e) => {
            e.preventDefault();
            btnSubmitJadwal.innerText = "Menyimpan...";
            btnSubmitJadwal.disabled = true;

            try {
                await addDoc(collection(db, "jadwal"), {
                    hari: document.getElementById('jad-hari').value,
                    waktu: document.getElementById('jad-waktu').value,
                    nama: document.getElementById('jad-nama').value,
                    ruang: document.getElementById('jad-ruang').value,
                    createdAt: Date.now()
                });

                alert("Jadwal Kuliah berhasil ditambahkan!");
                formJadwal.reset();
                btnSubmitJadwal.innerText = "Simpan Jadwal";
                btnSubmitJadwal.disabled = false;
                loadJadwal();

            } catch (error) {
                console.error("Gagal menyimpan jadwal: ", error);
                alert("Gagal menambahkan jadwal baru: " + error.message);
                btnSubmitJadwal.innerText = "Simpan Jadwal";
                btnSubmitJadwal.disabled = false;
            }
        });

        // AMBIL & CETAK DATA JADWAL KULIAH
        async function loadJadwal() {
            const tbody = document.getElementById('list-jadwal');
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:var(--text-gray);">Memuat data...</td></tr>';
            
            try {
                const q = query(collection(db, "jadwal"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                tbody.innerHTML = '';

                if (querySnapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:var(--text-gray);">Belum ada jadwal kuliah.</td></tr>';
                    return;
                }

                querySnapshot.forEach((res) => {
                    const data = res.data();
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong>${data.hari}</strong></td>
                        <td>${data.nama} <br><small style="color:var(--text-gray)">${data.ruang}</small></td>
                        <td>${data.waktu}</td>
                        <td style="text-align:center;">
                            <button class="btn-delete" data-collection="jadwal" data-id="${res.id}"><i class="fa-solid fa-trash-can"></i></button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                attachDeleteEvents();

            } catch (error) {
                console.error("Gagal memuat jadwal: ", error);
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:var(--accent-red);">Gagal memuat data jadwal.</td></tr>';
            }
        }

        // FUNGSI GLOBAL PENGHAPUSAN DATA (BISA UNTUK TABEL ANGGOTA MAUPUN JADWAL)
        function attachDeleteEvents() {
            document.querySelectorAll('.btn-delete').forEach(btn => {
                // Menghindari duplikasi penempelan event click
                btn.onclick = async (e) => {
                    e.stopImmediatePropagation();
                    
                    if (confirm("Apakah Anda yakin ingin menghapus data ini secara permanen?")) {
                        const id = btn.getAttribute('data-id');
                        const collectionName = btn.getAttribute('data-collection');
                        
                        try {
                            await deleteDoc(doc(db, collectionName, id));
                            alert("Data berhasil dihapus!");
                            
                            // Segarkan ulang masing-masing tabel berdasarkan data yang dihapus
                            if (collectionName === 'anggota') loadAnggota();
                            if (collectionName === 'jadwal') loadJadwal();
                        } catch (err) {
                            alert("Gagal menghapus data dari server: " + err.message);
                        }
                    }
                };
            });
        }

        // Jalankan pemanggilan data pertama kali saat dashboard admin dibuka
        loadAnggota();
        loadJadwal();
    </script>
</body>
</html>
